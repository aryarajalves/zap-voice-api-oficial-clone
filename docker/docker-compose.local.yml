services:
  # === CORE SERVICES ===
  zapvoice_app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: zapvoice_app
    ports:
      - "8000:8000"
    networks:
      - zapvoice_net
    volumes:
      - zapvoice_uploads:/app/static/uploads
      - ../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude "tests_unit/*" --reload-exclude "*.log" --reload-exclude "*.txt"
    env_file:
      - ../backend/.env
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:postgres@zapvoice-postgres:5432/zapvoice
      # Carregado via env_file (backend/.env)
      # - REGISTER_API_KEY=${REGISTER_API_KEY}

      # === INFRA LOCAL CONFIG (FROM .env) ===
      - RABBITMQ_HOST=${RABBITMQ_HOST:-zapvoice-rabbit}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      # Token da API do ManyChat — necessário para sincronizar contatos e tags via integração
      - MANYCHAT_API_KEY=
      # Dias para manter o histórico de webhooks no banco (0 = desabilitado, nunca apaga)
      - HISTORY_RETENTION_DAYS=${HISTORY_RETENTION_DAYS:-30}
      # Dias para manter as linhas do arquivo de log do container (0 = desabilitado)
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-7}
      # S3 Configs will be loaded from .env automatically via env_file

  zapvoice_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: zapvoice_worker
    command: python worker.py
    networks:
      - zapvoice_net
    volumes:
      - zapvoice_uploads:/app/static/uploads
      - ../backend:/app
    env_file:
      - ../backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@zapvoice-postgres:5432/zapvoice
      - SECRET_KEY=${SECRET_KEY:-zapvoice_long_secret_key_for_production_validation_min_32_chars}

      # === INFRA LOCAL CONFIG (FROM .env) ===
      - RABBITMQ_HOST=${RABBITMQ_HOST:-zapvoice-rabbit}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}

  zapvoice_frontend:
    image: node:20-alpine
    container_name: zapvoice_frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "5176:5173" # Alterado para 5176 para evitar conflitos
    command: sh -c "npm install && npm run dev"
    networks:
      - zapvoice_net
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_WS_URL=ws://localhost:8000/ws

  # === INFRASTRUCTURE SERVICES ===
  zapvoice-postgres:
    image: postgres:15-alpine
    container_name: zapvoice-postgres
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zapvoice
    volumes:
      - zapvoice_db_data:/var/lib/postgresql/data
    networks:
      - zapvoice_net

  zapvoice-rabbit:
    image: rabbitmq:3-management-alpine
    container_name: zapvoice-rabbit
    ports:
      - "5679:5672"
      - "15679:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - zapvoice_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: zapvoice_cloudflare
    restart: unless-stopped
    command: tunnel run
    env_file:
      - ../backend/.env
    networks:
      - zapvoice_net

volumes:
  zapvoice_uploads:
  zapvoice_db_data:


networks:
  zapvoice_net:
    driver: bridge
