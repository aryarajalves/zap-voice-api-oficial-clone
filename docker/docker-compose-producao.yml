version: "3.8"

services:
  # ==========================================
  # SERVIÇO PRINCIPAL (Backend + Frontend)
  # ==========================================
  zapvoice_app:
    image: aryarajalves/zap-voice-funil-api-oficial-zap:backend-3.5.8
    container_name: zap-voice-api-oficial
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    ports:
      - 8000:8000
    networks:
      - docker_zapvoice_net
    volumes:
      - zapvoice_uploads:/app/static/uploads
    env_file:
      - ../backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      - PORT=${PORT:-8000}
      - TZ=America/Sao_Paulo
      - ENABLE_SCHEDULER=true # Apenas a API gerencia o agendamento

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=1
        - traefik.http.routers.zapvoice.rule=Host(`${DOMAIN:-seu-dominio.com}`)
        - traefik.http.routers.zapvoice.entrypoints=websecure
        - traefik.http.routers.zapvoice.tls.certresolver=letsencryptresolver
        - traefik.http.services.zapvoice.loadbalancer.server.port=8000

  # ==========================================
  # SERVIÇO WORKER (Processamento em Segundo Plano)
  # ==========================================
  zapvoice_worker:
    image: aryarajalves/zap-voice-funil-api-oficial-zap:worker-3.5.8
    command: python worker.py
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - docker_zapvoice_net
    volumes:
      - zapvoice_uploads:/app/static/uploads
    env_file:
      - ../backend/.env
    environment:
      - TZ=America/Sao_Paulo
      - ENABLE_SCHEDULER=false # Worker nunca roda o agendamento

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

# ==========================================
# VOLUMES E REDES
# ==========================================
volumes:
  zapvoice_uploads:
    external: true
    name: zapvoice_uploads

networks:
  docker_zapvoice_net:
    name: docker_zapvoice_net
    external: true
